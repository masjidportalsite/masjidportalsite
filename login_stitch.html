<style>
        body { font-family: 'Geist', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(191, 201, 195, 0.3);
            box-shadow: 0 40px 100px -20px rgba(6, 78, 59, 0.15);
        }
        .islamic-pattern {
            background-color: #064e3b;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l2.5 7.5L40 10l-7.5 2.5L30 20l-2.5-7.5L20 10l7.5-2.5L30 0zm0 40l2.5 7.5L40 50l-7.5 2.5L30 60l-2.5-7.5L20 50l7.5-2.5L30 40zM0 30l7.5 2.5L10 40l2.5-7.5L20 30l-7.5-2.5L10 20l-2.5 7.5L0 30zm40 0l7.5 2.5L50 40l2.5-7.5L60 30l-7.5-2.5L50 20l-2.5 7.5L40 30z' fill='%23003527' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-primary-container text-on-surface selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface/70 backdrop-blur-md border-b border-outline-variant/20 shadow-sm shadow-primary/5">
<div class="flex justify-between items-center px-gutter py-base w-full max-w-[1440px] mx-auto">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="mosque">mosque</span>
<span class="font-headline-md text-headline-md font-bold text-primary">MasjidPortal</span>
</div>
<nav class="flex items-center gap-lg">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary-fixed-dim transition-colors duration-200" href="#">Support</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary-fixed-dim transition-colors duration-200" href="#">Pricing</a>
<button class="material-symbols-outlined text-on-surface-variant hover:text-secondary-fixed-dim" data-icon="language">language</button>
</nav>
</div>
</header>
<!-- Main Content Area -->
<main class="min-h-screen w-full flex items-center justify-center islamic-pattern pt-xl pb-xl px-gutter">
<!-- Login Card -->
<div class="glass-card w-full max-w-[480px] rounded-xl p-lg md:p-xl flex flex-col items-center">
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your sanctuary.</p>
</div>
<form class="w-full space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block px-xs" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-[52px] pr-md py-sm bg-white/50 border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-secondary-fixed focus:border-secondary focus:outline-none transition-all placeholder:text-outline/50" id="email" placeholder="name@masjid.org" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end px-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest block" for="password">Password</label>
<a class="font-body-md text-body-md text-secondary hover:text-secondary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-[52px] pr-md py-sm bg-white/50 border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-secondary-fixed focus:border-secondary focus:outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm py-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-secondary-fixed cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-sm bg-primary text-white font-headline-md text-headline-md rounded-lg shadow-lg hover:shadow-xl hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- SSO / Divider -->
<div class="relative py-md">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
<div class="relative flex justify-center text-label-caps uppercase tracking-widest bg-transparent">
<span class="bg-white/80 px-sm text-outline">or</span>
</div>
</div>
<button class="w-full py-sm bg-white/60 border border-secondary text-secondary font-body-lg text-body-lg rounded-lg hover:bg-secondary-fixed-dim/10 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined" data-icon="corporate_fare">corporate_fare</span>
                    Organization Login (SSO)
                </button>
</form>
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant/80">
                    Don't have an account? <a class="text-primary font-medium hover:underline" href="#">Contact your administrator</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bg-transparent">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-lg w-full max-w-[1440px] mx-auto gap-md">
<div class="flex items-center gap-sm opacity-60">
<span class="font-label-caps text-label-caps uppercase tracking-widest text-on-surface-variant">© 2024 MasjidPortal. All rights reserved.</span>
</div>
<div class="flex gap-lg">
<a class="font-body-md text-body-md text-on-surface-variant/70 hover:text-primary transition-all" href="#">Privacy Policy</a>
<a class="font-body-md text-body-md text-on-surface-variant/70 hover:text-primary transition-all" href="#">Terms of Service</a>
<a class="font-body-md text-body-md text-on-surface-variant/70 hover:text-primary transition-all" href="#">Security</a>
</div>
</div>
</footer>
